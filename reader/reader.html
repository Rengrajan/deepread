<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepRead — PDF Reader</title>
<!-- PDF.js from CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --ink: #0a1018;
    --accent: #4a9eff;
    --highlight: #ffd166;
    --text: #b8d0e8;
    --card-bg: #0d1520;
    --card-border: #2a5a8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    font-size: 17px;
    line-height: 1.9;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: #050c14;
    border-bottom: 1px solid #1a2840;
    padding: 0 28px;
    height: 50px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.16em;
    flex-shrink: 0;
  }
  .pdf-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #3a5a7a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .page-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #3a5a7a;
    flex-shrink: 0;
  }

  /* ── Loading / error ── */
  #status {
    max-width: 680px;
    margin: 60px auto;
    padding: 0 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #4a6a8a;
    text-align: center;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid #1a2840;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── PDF content ── */
  #reader {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 36px 120px;
    display: none;
  }

  .pdf-page-block {
    margin-bottom: 0;
  }
  .page-divider {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: #1a3050;
    letter-spacing: 0.12em;
    text-align: center;
    padding: 20px 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .page-divider::before, .page-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1a2840;
  }

  .pdf-para {
    color: #a8c4dc;
    margin-bottom: 14px;
    cursor: text;
  }
  .pdf-para:last-child { margin-bottom: 0; }

  /* Heading detection */
  .pdf-para.heading {
    font-size: 15px;
    font-weight: 500;
    color: #c8dff0;
    letter-spacing: 0.02em;
    margin-top: 24px;
    margin-bottom: 10px;
  }

  /* Highlighted selections */
  .deepread-hl {
    background: rgba(255, 209, 102, 0.2);
    border-bottom: 2px solid var(--highlight);
    border-radius: 2px;
  }

  /* ── DeepRead cards (same style as content.css) ── */
  .deepread-wrapper { margin: 6px 0 10px; }

  .deepread-card {
    margin: 4px 0;
    border-left: 3px solid var(--card-border);
    background: var(--card-bg);
    border-radius: 0 8px 8px 0;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    animation: cardIn 0.2s cubic-bezier(0.16,1,0.3,1);
    font-family: 'Lora', Georgia, serif;
  }
  .deepread-card.depth-2 { background: #0d1a14; border-color: #1a7a5a; margin-left: 16px; }
  .deepread-card.depth-3 { background: #140d1a; border-color: #7a4a9a; margin-left: 32px; }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .deepread-card-header {
    padding: 10px 12px 8px;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .deepread-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
    color: var(--accent);
    background: rgba(74,158,255,0.12);
    border: 1px solid rgba(74,158,255,0.25);
    border-radius: 10px; padding: 2px 8px;
    flex-shrink: 0; margin-top: 2px; text-transform: uppercase;
  }
  .depth-2 .deepread-chip { color: #4adfaa; background: rgba(74,223,170,0.1); border-color: rgba(74,223,170,0.25); }
  .depth-3 .deepread-chip { color: #bf7aff; background: rgba(191,122,255,0.1); border-color: rgba(191,122,255,0.25); }

  .deepread-q {
    font-style: italic; color: #6a8aaa;
    font-size: 13px; line-height: 1.5; flex: 1;
  }
  .deepread-collapse {
    background: transparent; border: none;
    color: #3a5a7a; cursor: pointer; font-size: 14px;
    padding: 0; flex-shrink: 0; transition: color 0.15s;
  }
  .deepread-collapse:hover { color: var(--accent); }

  .deepread-body {
    padding: 8px 14px 12px;
    font-size: 14px; line-height: 1.8; color: #8aaac8;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
  .deepread-body p { margin: 0 0 8px; }
  .deepread-body p:last-child { margin-bottom: 0; }

  .deepread-dots { display: flex; gap: 5px; padding: 4px 0; }
  .deepread-dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); opacity: 0.6;
    animation: bounce 1.1s infinite;
  }
  .deepread-dots span:nth-child(2) { animation-delay: 0.18s; }
  .deepread-dots span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px);opacity:1} }

  .deepread-cursor {
    display: inline-block; width: 2px; height: 13px;
    background: var(--accent); margin-left: 2px;
    vertical-align: middle; animation: blink 0.8s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .deepread-footer {
    display: none; padding: 0 12px 8px; gap: 6px; flex-wrap: wrap;
  }
  .deepread-sug {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: transparent; border: 1px solid #1a3050;
    color: #4a6a8a; padding: 3px 10px; border-radius: 10px;
    cursor: pointer; transition: all 0.15s;
  }
  .deepread-sug:hover { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,0.08); }
  .deepread-sug:disabled { opacity: 0.3; cursor: default; }

  .deepread-ask-row {
    display: none; padding: 0 12px 10px; gap: 6px; align-items: center;
  }
  .deepread-ask-input {
    flex: 1; background: #080e17; border: 1px solid #1a2840;
    border-radius: 4px; padding: 5px 10px;
    font-family: 'Lora', serif; font-size: 12px; color: #a0c0d8; outline: none;
  }
  .deepread-ask-input:focus { border-color: var(--accent); }
  .deepread-ask-btn {
    background: #1a2e47; color: var(--accent);
    border: 1px solid #2a4a6a; border-radius: 4px;
    padding: 5px 10px; font-family: 'JetBrains Mono', monospace;
    font-size: 11px; cursor: pointer; transition: background 0.15s;
  }
  .deepread-ask-btn:hover { background: #1f3a5a; }
  .deepread-nested {}

  .deepread-card.collapsed .deepread-body,
  .deepread-card.collapsed .deepread-footer,
  .deepread-card.collapsed .deepread-ask-row,
  .deepread-card.collapsed .deepread-nested { display: none !important; }

  /* ── Ask bubble ── */
  #deepread-bubble {
    position: fixed;
    z-index: 9999;
    display: none;
    background: #0f1923;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em;
    padding: 7px 16px 7px 12px;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(74,158,255,0.3);
    white-space: nowrap;
    user-select: none;
    transition: transform 0.1s;
  }
  #deepread-bubble:hover { transform: translateY(-2px); }
  #deepread-bubble::before { content: '⬡ '; font-size: 11px; }

  /* tip */
  .tip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: #1a3050;
    text-align: center; margin-top: 48px;
    letter-spacing: 0.05em;
  }
  .tip span { color: #2a5a8a; }
</style>
</head>
<body>

<header>
  <div class="logo">DEEPREAD</div>
  <div class="pdf-title" id="pdf-title">Loading PDF…</div>
  <div class="page-info" id="page-info"></div>
</header>

<div id="status">
  <div class="spinner"></div>
  <div id="status-text">Fetching PDF…</div>
</div>

<div id="reader"></div>

<div id="deepread-bubble">Ask DeepRead</div>

<script>
// ── Config ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let settings = { host: 'http://localhost:11434', model: 'qwen2.5:14b' };
let fullDocText = ''; // entire PDF text — always sent as context
let cardCounter = 0;
const streamBuffers = {};
let currentSelection = '';
let currentRange = null;
let currentDepth = 0;
let savedBlock = null;

// Load settings from extension storage
chrome.storage.sync.get({ host: 'http://localhost:11434', model: 'qwen2.5:14b' }, (res) => {
  settings = res;
});

// Listen for stream chunks from background
chrome.runtime.onMessage.addListener((msg) => {
  if (msg.type === 'STREAM_CHUNK') handleChunk(msg);
  if (msg.type === 'STREAM_ERROR') handleError(msg);
});

// ── Load PDF ──
const params = new URLSearchParams(window.location.search);
const pdfUrl = params.get('pdf');

if (!pdfUrl) {
  document.getElementById('status-text').textContent = 'No PDF URL provided.';
} else {
  document.getElementById('pdf-title').textContent = decodeURIComponent(pdfUrl.split('/').pop());
  loadPDF(pdfUrl);
}

async function loadPDF(url) {
  setStatus('Fetching PDF…');
  try {
    // Route through background script to bypass CORS
    const result = await new Promise((resolve) => {
      chrome.runtime.sendMessage({ type: 'FETCH_PDF', url }, resolve);
    });

    if (!result || !result.ok) {
      setStatus(`Failed to fetch PDF: ${result?.error || 'Unknown error'}`);
      return;
    }

    setStatus('Parsing PDF…');

    // result.data is a Uint8Array transferred via structured clone
    const pdf = await pdfjsLib.getDocument({ data: result.data }).promise;
    const totalPages = pdf.numPages;
    document.getElementById('page-info').textContent = `${totalPages} pages`;

    setStatus(`Extracting text from ${totalPages} pages…`);

    const reader = document.getElementById('reader');
    reader.innerHTML = '';
    const allText = [];

    for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
      setStatus(`Reading page ${pageNum} of ${totalPages}…`);
      const page = await pdf.getPage(pageNum);
      const content = await page.getTextContent();

      // Group text items into lines then paragraphs
      const lines = [];
      let currentLine = [];
      let lastY = null;

      content.items.forEach(item => {
        if (!item.str.trim() && item.str !== ' ') return;
        const y = Math.round(item.transform[5]);
        if (lastY !== null && Math.abs(y - lastY) > 5) {
          if (currentLine.length) lines.push(currentLine.join(''));
          currentLine = [];
        }
        currentLine.push(item.str);
        lastY = y;
      });
      if (currentLine.length) lines.push(currentLine.join(''));

      // Group lines into paragraphs (double line gap or short line = new para)
      const paragraphs = [];
      let curPara = [];
      lines.forEach((line, i) => {
        const trimmed = line.trim();
        if (!trimmed) {
          if (curPara.length) { paragraphs.push(curPara.join(' ')); curPara = []; }
          return;
        }
        curPara.push(trimmed);
        // Heuristic: if line ends without punctuation and next starts with capital, it might be end of para
        const next = lines[i+1]?.trim();
        if (next && /[a-z]$/.test(trimmed) === false && /^[A-Z0-9]/.test(next) && curPara.length > 1) {
          paragraphs.push(curPara.join(' '));
          curPara = [];
        }
      });
      if (curPara.length) paragraphs.push(curPara.join(' '));

      // Page divider
      if (pageNum > 1) {
        const div = document.createElement('div');
        div.className = 'page-divider';
        div.textContent = `PAGE ${pageNum}`;
        reader.appendChild(div);
      }

      // Render paragraphs
      paragraphs.forEach(para => {
        if (para.trim().length < 3) return;
        const block = document.createElement('div');
        block.className = 'pdf-page-block';

        const p = document.createElement('p');
        p.className = 'pdf-para';
        // Detect headings: short, all-caps or title-case, no period at end
        const isHeading = para.length < 120 && !/\.$/.test(para) &&
          (para === para.toUpperCase() || /^[A-Z][^a-z]{0,3}[A-Z]/.test(para));
        if (isHeading) p.classList.add('heading');
        p.textContent = para;
        block.appendChild(p);

        const nested = document.createElement('div');
        nested.className = 'deepread-nested-root';
        block.appendChild(nested);

        reader.appendChild(block);
        allText.push(para);
      });
    }

    // Store full document text for context
    fullDocText = allText.join('\n\n');

    const tip = document.createElement('div');
    tip.className = 'tip';
    tip.innerHTML = 'Select any text to ask DeepRead — <span>full paper sent as context</span>';
    reader.appendChild(tip);

    document.getElementById('status').style.display = 'none';
    reader.style.display = 'block';

    initSelection();

  } catch(e) {
    setStatus(`Error loading PDF: ${e.message}`);
  }
}

function setStatus(text) {
  document.getElementById('status-text').textContent = text;
}

// ── Selection + bubble ──
function initSelection() {
  const bubble = document.getElementById('deepread-bubble');

  bubble.addEventListener('mousedown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    handleAsk();
  });

  document.addEventListener('mouseup', (e) => {
    if (e.target === bubble) return;
    setTimeout(() => {
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed) { hideBubble(); return; }
      const text = sel.toString().trim();
      if (text.length < 2) { hideBubble(); return; }

      currentSelection = text;
      try { currentRange = sel.getRangeAt(0).cloneRange(); } catch(e) { return; }

      let node = currentRange.startContainer;
      if (node.nodeType === 3) node = node.parentElement;

      currentDepth = 0;
      let p = node;
      while (p) {
        if (p.classList?.contains('deepread-card')) currentDepth++;
        p = p.parentElement;
      }

      savedBlock = findBlock(node, currentDepth);

      const rect = sel.getRangeAt(0).getBoundingClientRect();
      bubble.style.display = 'block';
      bubble.style.left = Math.max(8, Math.min(rect.left + rect.width/2 - 70, window.innerWidth - 160)) + 'px';
      bubble.style.top = Math.max(8, rect.top - 44) + 'px';
    }, 10);
  });

  document.addEventListener('mousedown', (e) => {
    if (e.target === bubble) return;
    hideBubble();
  });
}

function hideBubble() {
  document.getElementById('deepread-bubble').style.display = 'none';
}

function findBlock(node, depth) {
  if (depth > 0) {
    let n = node;
    while (n) {
      if (n.classList?.contains('deepread-card')) return n;
      n = n.parentElement;
    }
  }
  let n = node;
  const blockTags = ['P','DIV','SECTION','BLOCKQUOTE','LI','H1','H2','H3','H4','H5','H6'];
  while (n && n !== document.body) {
    if (blockTags.includes(n.tagName)) {
      const hasBlock = [...(n.children||[])].some(c => blockTags.includes(c.tagName));
      if (!hasBlock) return n;
    }
    n = n.parentElement;
  }
  return node;
}

function handleAsk() {
  if (!currentSelection || !currentRange || !savedBlock) return;
  hideBubble();

  try {
    const hl = document.createElement('mark');
    hl.className = 'deepread-hl';
    hl.textContent = currentSelection;
    currentRange.deleteContents();
    currentRange.insertNode(hl);
  } catch(e) {}

  window.getSelection()?.removeAllRanges();

  const wrapper = getOrCreateWrapper(savedBlock, currentDepth);
  // Always use FULL PDF text as context
  createCard(currentSelection, wrapper, currentDepth + 1, fullDocText);
}

function getOrCreateWrapper(block, depth) {
  if (depth > 0) {
    let nested = block.querySelector(':scope > .deepread-nested');
    if (!nested) {
      nested = document.createElement('div');
      nested.className = 'deepread-nested';
      block.appendChild(nested);
    }
    return nested;
  }
  let next = block.nextElementSibling;
  if (next && next.classList.contains('deepread-wrapper')) return next;
  const wrapper = document.createElement('div');
  wrapper.className = 'deepread-wrapper';
  block.after(wrapper);
  return wrapper;
}

// ── Card ──
function createCard(question, container, depth, context) {
  const cardId = `dr-${++cardCounter}`;
  streamBuffers[cardId] = '';

  const depthClass = depth >= 3 ? 'depth-3' : depth === 2 ? 'depth-2' : '';
  const card = document.createElement('div');
  card.className = `deepread-card ${depthClass}`;
  card.dataset.cardId = cardId;

  card.innerHTML = `
    <div class="deepread-card-header">
      <div class="deepread-chip">Q${depth}</div>
      <div class="deepread-q">${esc(question)}</div>
      <button class="deepread-collapse">−</button>
    </div>
    <div class="deepread-body">
      <div class="deepread-dots"><span></span><span></span><span></span></div>
    </div>
    <div class="deepread-footer"></div>
    <div class="deepread-ask-row">
      <input class="deepread-ask-input" type="text" placeholder="Ask a follow-up…" />
      <button class="deepread-ask-btn">ask →</button>
    </div>
    <div class="deepread-nested"></div>
  `;

  container.appendChild(card);
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 30);

  card.querySelector('.deepread-collapse').addEventListener('click', () => {
    card.classList.toggle('collapsed');
    card.querySelector('.deepread-collapse').textContent = card.classList.contains('collapsed') ? '+' : '−';
  });

  const input = card.querySelector('.deepread-ask-input');
  const askBtn = card.querySelector('.deepread-ask-btn');
  const submit = () => {
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    createCard(q, card.querySelector(':scope > .deepread-nested'), depth + 1, fullDocText);
  };
  askBtn.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });

  streamCard(question, context, depth, cardId);
}

function streamCard(question, context, depth, cardId) {
  const system = `You are a research paper reading companion. The user is reading an academic paper and selected something to understand better.

Instructions:
- Answer in 2-4 focused paragraphs. Flowing prose, no bullet points.
- Don't restate the question. Be specific and insightful.
- Ground your answer in the paper's content using the full document context provided.
- At depth 2-3, go more technical and precise.
- End in a way that invites the next question.

Depth: ${depth}/3.`;

  // Send full PDF text as context (truncated to model's usable window)
  const prompt = `${system}

FULL PAPER CONTENT:
"""
${context.slice(0, 10000)}
"""

The reader selected and wants to understand: "${question}"

Answer clearly, grounded in the paper above:`;

  chrome.runtime.sendMessage({
    type: 'OLLAMA_STREAM',
    host: settings.host,
    model: settings.model,
    prompt,
    cardId
  });
}

function handleChunk({ cardId, text, done }) {
  streamBuffers[cardId] = (streamBuffers[cardId] || '') + text;
  const card = document.querySelector(`[data-card-id="${cardId}"]`);
  if (!card) return;
  const body = card.querySelector('.deepread-body');

  if (!done) {
    body.innerHTML = streamBuffers[cardId]
      .split(/\n{2,}/).filter(p => p.trim())
      .map(p => `<p>${esc(p.trim())}</p>`).join('')
      + '<span class="deepread-cursor"></span>';
  } else {
    const fullText = streamBuffers[cardId];
    body.innerHTML = fullText.split(/\n{2,}/).filter(p => p.trim())
      .map(p => `<p>${esc(p.trim())}</p>`).join('') || '<p style="color:#666">No response.</p>';

    const footer = card.querySelector('.deepread-footer');
    const depth = parseInt(card.querySelector('.deepread-chip').textContent.replace('Q',''));
    footer.style.display = 'flex';
    pickSuggestions().forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'deepread-sug';
      btn.textContent = s;
      btn.addEventListener('click', () => {
        btn.disabled = true;
        createCard(s, card.querySelector(':scope > .deepread-nested'), depth + 1, fullDocText);
      });
      footer.appendChild(btn);
    });
    card.querySelector('.deepread-ask-row').style.display = 'flex';
  }
}

function handleError({ cardId, error }) {
  const card = document.querySelector(`[data-card-id="${cardId}"]`);
  if (!card) return;
  card.querySelector('.deepread-body').innerHTML =
    `<p style="color:#ff6655;font-size:12px;font-family:monospace">${esc(error)}</p>`;
}

const SUGS = [
  'Why is this significant?', 'Give me an intuitive example',
  'How does this connect to the paper\'s main contribution?',
  'What\'s the technical detail behind this?',
  'What are the limitations here?', 'Go deeper on this'
];
function pickSuggestions() {
  const i = Math.floor(Math.random() * (SUGS.length - 1));
  return [SUGS[i], SUGS[i+1]];
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
